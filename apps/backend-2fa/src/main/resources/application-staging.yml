# application-staging.yml — BankPortal STG local
# Perfil activado con SPRING_PROFILES_ACTIVE=staging
# Relaja restricciones de producción para entorno STG local

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/bankportal}
    username: ${DB_USER:bankportal}
    password: ${DB_PASSWORD:bankportal_stg_2026}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      url: ${REDIS_URL:redis://:redis_stg_2026@redis:6379}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${EMAIL_API_KEY:stub}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

# JWT — HMAC HS256 — claves >= 32 chars (256 bits) requerido por RFC 7518
jwt:
  secret: ${JWT_SECRET:stg-jwt-hmac-secret-minimum-32bytes!}
  pre-auth-secret: ${JWT_PRE_AUTH_SECRET:stg-preauth-hmac-secret-32bytes-ok!}
  pre-auth-ttl-seconds: 300
  session-ttl-seconds: 28800

# Deshabilitar auto-configuracion OAuth2 Resource Server en STG
# (el proyecto usa JJWT custom, no Spring OAuth2 JWT)
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

# TOTP — clave AES-256 stub para STG
# Base64 de "stg-totp-aes-key-exactly-32bytes" = 32 bytes exactos (AES-256)
totp:
  aes-key: ${TOTP_AES_KEY:c3RnLXRvdHAtYWVzLWtleS1leGFjdGx5LTMyYnl0ZXM=}

# Session deny-link HMAC
session:
  deny-link:
    hmac-key: ${SESSION_DENY_LINK_HMAC_KEY:stg-deny-link-hmac-key-32-bytes!!}
    ttl-hours: 24

# Trusted devices HMAC
trusted-device:
  hmac-key: ${TRUSTED_DEVICE_HMAC_KEY:stg-trusted-device-hmac-key-32b!!}
  ttl-days: 30
  max-per-user: 10
  cookie-secure: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,flyway
  health:
    mail:
      enabled: false    # Sin SMTP real en STG — evita health DOWN por Connection refused
    redis:
      enabled: true
    db:
      enabled: true

logging:
  level:
    root: INFO
    com.experis.sofia.bankportal: INFO
    org.flywaydb: INFO
