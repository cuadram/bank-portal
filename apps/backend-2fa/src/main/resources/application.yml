# BankPortal — Backend 2FA | Banco Meridian
# FEAT-001 | Sprint 01 | SOFIA Software Factory — Experis
#
# SEGURIDAD: ningún secreto está hardcodeado aquí.
# Todas las variables sensibles deben definirse como variables de entorno.
# Ver: docs/architecture/lld/FEAT-001-lld-backend.md §6 Variables de entorno

spring:
  application:
    name: bankportal-backend-2fa
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bankportal}
    username: ${DB_USERNAME:bankportal_app}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway gestiona el schema — nunca auto/create
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false   # El schema es nuevo — no hay baseline

# TOTP — ADR-004
# TOTP_ISSUER     : nombre visible en apps authenticator (ej. "BankMeridian")
# TOTP_AES_KEY    : clave AES-256 en Base64 (32 bytes = 44 chars Base64)
totp:
  issuer: ${TOTP_ISSUER:BankMeridian}
  aes-key: ${TOTP_AES_KEY}
  period: 30
  code-digits: 6
  tolerance: 1

# JWT — ADR-001
# JWT_SECRET           : secreto para JWT de sesión completa
# PRE_AUTH_TOKEN_SECRET: secreto independiente para pre-auth tokens
# PRE_AUTH_TOKEN_TTL_MIN: TTL del pre-auth token (default: 5 min)
jwt:
  secret: ${JWT_SECRET}
  pre-auth-secret: ${PRE_AUTH_TOKEN_SECRET}
  pre-auth-ttl-seconds: ${PRE_AUTH_TOKEN_TTL_MIN:5}

# Rate Limiting — ADR-002
# Configuración conservadora para portal bancario
rate-limit:
  capacity: ${RATE_LIMIT_MAX_ATTEMPTS:5}
  window-minutes: ${RATE_LIMIT_WINDOW_MIN:10}
  block-minutes: ${RATE_LIMIT_BLOCK_MIN:15}

server:
  port: 8080
  error:
    include-message: never    # OWASP: no exponer detalles de error al cliente
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.experis.sofia.bankportal: DEBUG
    org.springframework.security: WARN
