spring:
  application:
    name: bankportal-backend-2fa
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bankportal}
    username: ${DB_USERNAME:bankportal_app}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
  mail:
    host: ${SMTP_HOST:smtp.sendgrid.net}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:apikey}
    password: ${EMAIL_API_KEY}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000

totp:
  issuer: ${TOTP_ISSUER:BankMeridian}
  aes-key: ${TOTP_AES_KEY}
  stg-bypass-code: ""   # vacío en producción — STG override en application-staging.yml
  period: 30
  code-digits: 6
  tolerance: 1

jwt:
  secret: ${JWT_SECRET:changeme-jwt-hmac-secret-min-32bytes!}
  pre-auth-secret: ${JWT_PRE_AUTH_SECRET:changeme-preauth-hmac-secret-32bytes!}
  pre-auth-ttl-seconds: ${JWT_PRE_AUTH_TTL_SECONDS:300}
  session-ttl-seconds: ${JWT_SESSION_TTL_SECONDS:28800}

rate-limit:
  capacity: ${RATE_LIMIT_MAX_ATTEMPTS:5}
  window-minutes: ${RATE_LIMIT_WINDOW_MIN:10}
  block-minutes: ${RATE_LIMIT_BLOCK_MIN:15}

session:
  max-concurrent: ${SESSION_MAX_CONCURRENT:3}
  default-timeout-minutes: ${SESSION_DEFAULT_TIMEOUT_MIN:30}
  max-timeout-minutes: ${SESSION_MAX_TIMEOUT_MIN:60}
  deny-link:
    hmac-key: ${SESSION_DENY_LINK_HMAC_KEY}
    ttl-hours: ${SESSION_DENY_LINK_TTL_HOURS:24}

trusted-device:
  hmac-key: ${TRUSTED_DEVICE_HMAC_KEY}
  ttl-days: ${TRUSTED_DEVICE_TTL_DAYS:30}
  max-per-user: ${TRUSTED_DEVICE_MAX_PER_USER:10}
  cookie-secure: ${TRUSTED_DEVICE_COOKIE_SECURE:true}

notification:
  email:
    from: ${EMAIL_FROM:seguridad@bankmeridian.com}
    deny-base-url: ${DENY_BASE_URL:https://api.bankportal.meridian.com/v1/sessions/deny}

kyc:
  storage:
    path: ${KYC_STORAGE_PATH:/tmp/kyc-docs}
    encryption-key: ${KYC_ENCRYPTION_KEY:}
    max-file-mb: ${KYC_STORAGE_MAX_FILE_MB:10}
  grace-period-days: ${KYC_GRACE_PERIOD_DAYS:90}
  auto-validation-enabled: ${KYC_AUTO_VALIDATION_ENABLED:true}

# ── FEAT-014: Notificaciones Push & In-App ─────────────────────────────────
notifications:
  push:
    vapid-public-key: ${VAPID_PUBLIC_KEY:}
    vapid-private-key: ${VAPID_PRIVATE_KEY:}
    vapid-subject: ${VAPID_SUBJECT:mailto:no-reply@bancomeridian.es}
    ttl-seconds: ${VAPID_TTL_SECONDS:86400}
  sse:
    replay-ttl-seconds: ${SSE_REPLAY_TTL_SECONDS:300}
  alert:
    transaction-amount-threshold: ${NOTIFICATION_THRESHOLD_ALERT:1000}

scheduling:
  enabled: ${SCHEDULING_ENABLED:true}

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,readiness,liveness
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.experis.sofia.bankportal: DEBUG
    org.springframework.security: WARN

# Productos bancarios — FEAT-021 + DEBT-044
bank:
  products:
    deposit:
      tin: 0.0325
      tae: 0.0330
      penalty-rate: 0.25
      min-amount: 1000
      max-plazo-meses: 60
    bizum:
      limit:
        per-operation: 500
        per-day: 2000
      request:
        ttl-hours: 24
    loan:
      tae: 6.95
