# Perfil para ITs Bizum usando PostgreSQL del Docker Compose existente (sin Testcontainers)
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/bankportal
    username: bankportal
    password: ${DB_PASSWORD:bankportal_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: localhost
      port: 6379

totp:
  aes-key: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
  issuer: BankMeridianIntTest
  period: 30
  code-digits: 6
  tolerance: 1

jwt:
  secret: integration-test-jwt-secret-must-be-at-least-256-bits-long-for-hs256-ok
  pre-auth-secret: integration-test-pre-auth-secret-must-be-at-least-256-bits-long-ok
  pre-auth-ttl-seconds: 300

bank:
  bizum:
    limit:
      per-operation: 500
      per-day: 2000
    request:
      ttl-hours: 24

server:
  port: 0
  error:
    include-message: always
    include-stacktrace: never

logging:
  level:
    root: WARN
    com.experis.sofia.bankportal: INFO
    org.flywaydb: INFO
