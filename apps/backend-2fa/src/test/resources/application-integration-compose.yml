# Perfil para ITs Bizum usando PostgreSQL del Docker Compose existente (sin Testcontainers)
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/bankportal
    username: bankportal
    password: ${DB_PASSWORD:bankportal_stg_2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: localhost
    port: 25
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

totp:
  aes-key: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
  issuer: BankMeridianIntTest
  period: 30
  code-digits: 6
  tolerance: 1

jwt:
  secret: integration-test-jwt-secret-must-be-at-least-256-bits-long-for-hs256-ok
  pre-auth-secret: integration-test-pre-auth-secret-must-be-at-least-256-bits-long-ok
  pre-auth-ttl-seconds: 300

bank:
  core:
    base-url: http://localhost:9999
    api-key: dummy-key-for-integration-tests
  products:
    loan:
      tae: 5.00
    deposit:
      tin: 3.50
      tae: 3.57
  bizum:
    limit:
      per-operation: 500
      per-day: 2000
    request:
      ttl-hours: 24

notifications:
  push:
    vapid-public-key: BDummyVapidPublicKeyForIntegrationTestsOnlyNotRealKey12345678
    vapid-private-key: DummyVapidPrivateKeyForIntegrationTestsOnlyNotRealKey1234

notification:
  email:
    deny-base-url: http://localhost:8080/session/deny

trusted-device:
  hmac-key: dummy-hmac-key-for-integration-tests-only-not-real

kyc:
  encryption-key: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=

session:
  deny-link:
    hmac-key: dummy-session-deny-link-hmac-key-for-integration-tests

server:
  port: 0
  error:
    include-message: always
    include-stacktrace: never

logging:
  level:
    root: WARN
    com.experis.sofia.bankportal: INFO
    org.flywaydb: INFO
