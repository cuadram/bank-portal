<div class="breadcrumb"><a (click)="back()">Bizum</a> › Enviar pago</div>
<h1 class="page-title">Enviar Bizum</h1>

<div class="stepper">
  <span [class]="step >= 1 ? 'step active' : 'step'">1 Datos</span>
  <span class="step-line" [class.done]="step >= 2"></span>
  <span [class]="step >= 2 ? 'step active' : 'step pending'">2 Confirmar OTP</span>
</div>

<div class="card card-body" *ngIf="step === 1">
  <div class="form-group">
    <label class="form-label">Teléfono destinatario *</label>
    <input class="form-input" type="tel" [formControl]="recipientPhoneCtrl" placeholder="+34 6XX XXX XXX">
  </div>
  <div class="form-group">
    <label class="form-label">Importe * (máx. €500)</label>
    <input class="form-input" type="number" [formControl]="amountCtrl" placeholder="0,00">
  </div>
  <div class="form-group">
    <label class="form-label">Concepto (opcional)</label>
    <input class="form-input" [formControl]="conceptCtrl" placeholder="Máx. 35 caracteres">
  </div>
  <div class="card-footer">
    <button class="btn btn-ghost" (click)="back()">Cancelar</button>
    <button class="btn btn-primary" (click)="goToConfirm()">Continuar →</button>
  </div>
</div>

<div class="card card-body" *ngIf="step === 2">
  <div class="confirm-summary">
    <div class="confirm-row"><span>A</span><span>{{ form.get('recipientPhone')?.value }}</span></div>
    <div class="confirm-row"><span>Importe</span><span>{{ form.get('amount')?.value | currency:'EUR' }}</span></div>
    <div class="confirm-row"><span>Concepto</span><span>{{ form.get('concept')?.value || '—' }}</span></div>
  </div>
  <div class="form-group" style="text-align:center;margin-top:16px">
    <label class="form-label">Código OTP (6 dígitos)</label>
    <input class="form-input otp-input" type="text" maxlength="6" [formControl]="otpCtrl" placeholder="______">
    <div class="form-hint">STG bypass: 123456</div>
  </div>
  <div class="alert alert-warning">⚠ Este pago es inmediato e irreversible. Verifica el número.</div>
  <div *ngIf="error" class="alert alert-error">{{ error }}</div>
  <div class="card-footer">
    <button class="btn btn-ghost" (click)="back()">← Volver</button>
    <button class="btn btn-primary" (click)="confirm()" [disabled]="loading">
      {{ loading ? 'Enviando...' : 'Confirmar envío' }}
    </button>
  </div>
</div>
