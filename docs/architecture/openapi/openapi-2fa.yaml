openapi: 3.0.3
info:
  title: BankPortal — Security API
  description: |
    API de Seguridad para BankPortal — Banco Meridian.
    Cubre: 2FA TOTP, sesiones activas, dispositivos de confianza, notificaciones,
    auditoría de seguridad, bloqueo de cuenta y autenticación contextual.

    ## Autenticación
    Todos los endpoints requieren Bearer JWT en `Authorization`.
    Los JWTs se firman con **RS256** (keypair RSA-2048 gestionado en Jenkins + K8s Secret `bankportal-jwt-keypair`).

    ### Scopes JWT
    - **`2fa-pending`**: emitido tras validar credenciales. Requerido en: `/enroll`, `/activate`, `/verify`, `/verify-recovery`.
    - **`full-session`**: emitido tras 2FA exitoso. Requerido en todos los demás endpoints.
    - **`context-pending`** *(FEAT-006 US-603)*: emitido cuando se detecta contexto inusual (nueva subnet IP). Válido solo para `POST /api/v1/auth/confirm-context`. Claims adicionales: `pendingSubnet`, `jti`. Blacklisted tras primer uso exitoso (DEBT-009).

    ## Rate Limiting
    `POST /api/v1/2fa/verify`: máximo 5 intentos fallidos por usuario+IP → bloqueo 15 min (Bucket4j + Redis).

    ## Changelog
    | Versión | Cambio |
    |---------|--------|
    | 1.5.0 | FEAT-004 Sprint 8: endpoints Centro de Notificaciones (US-301/302/303/304/305). SSE /stream documentado con Last-Event-ID y headers ADR-010. DEBT-009: JWT blacklist integrado en bearerJwtContextPending. ACT-31. |
    | 1.4.1 | US-604: endpoint /security/config-history + schemas ConfigHistoryPage y ConfigChangeEvent. RV-S7-002 fix. |
    | 1.4.0 | FEAT-005: endpoints /security/dashboard y /security/export. FEAT-006: endpoints bloqueo de cuenta y login contextual. ACT-30: claims JWT documentados en securitySchemes. Sprint 7. |
    | 1.3.0 | FEAT-003: endpoints Dispositivos de Confianza. FEAT-004: endpoints Notificaciones + SSE. ACT-19 (Sprint 5). |
    | 1.2.0 | FEAT-002: gestión de sesiones activas (US-101→105). |
    | 1.1.0 | `DELETE /deactivate` deprecado → `POST /deactivate`. JWTs actualizados a RS256. |
    | 1.0.0 | Versión inicial — FEAT-001 Sprint 1. |

  version: '1.5.0'
  contact:
    name: SOFIA Engineering — Experis
    email: sofia@experis.com

servers:
  - url: https://api-staging.bankportal.meridian.com
    description: STG — Staging environment
  - url: https://api.bankportal.meridian.com
    description: PROD — Production environment
  - url: http://localhost:8080
    description: Local development

tags:
  - name: 2FA
    description: Autenticación de dos factores (TOTP)
  - name: Sessions
    description: Gestión de sesiones activas
  - name: TrustedDevices
    description: Dispositivos de confianza
  - name: Notifications
    description: Centro de notificaciones de seguridad (FEAT-004 Sprint 8)
  - name: Audit
    description: Panel de auditoría y historial de configuración
  - name: Account
    description: Bloqueo y desbloqueo de cuenta
  - name: Auth
    description: Autenticación contextual

paths:

  # ─── FEAT-004: Centro de Notificaciones ─────────────────────────────────────

  /api/v1/notifications:
    get:
      tags: [Notifications]
      summary: Historial paginado de notificaciones (US-301)
      description: |
        Retorna el historial paginado de notificaciones de seguridad del usuario
        para los últimos 90 días. Respuesta 200 siempre (nunca 404 — lista vacía es válida).
      security:
        - bearerJwtFull: []
      parameters:
        - name: eventType
          in: query
          required: false
          description: Filtro por tipo de evento exacto (ej. LOGIN_NEW_DEVICE)
          schema: { type: string }
        - name: unreadOnly
          in: query
          required: false
          description: Si true, retorna solo notificaciones no leídas
          schema: { type: boolean }
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          required: false
          schema: { type: integer, default: 20, maximum: 50 }
        - name: sort
          in: query
          required: false
          schema: { type: string, default: 'createdAt,desc' }
      responses:
        '200':
          description: Página de notificaciones (puede ser vacía)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPage' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/notifications/{id}/read:
    put:
      tags: [Notifications]
      summary: Marcar notificación como leída (US-302)
      description: Operación idempotente — 204 siempre, incluso si ya estaba leída.
      security:
        - bearerJwtFull: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Notificación marcada como leída }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/notifications/read-all:
    put:
      tags: [Notifications]
      summary: Marcar todas como leídas (US-302)
      description: Marca todas las notificaciones no leídas del usuario como leídas en una sola operación.
      security:
        - bearerJwtFull: []
      responses:
        '200':
          description: Notificaciones actualizadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                    description: Número de notificaciones marcadas como leídas
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Contador de notificaciones no leídas (US-303)
      description: |
        Retorna el conteo de notificaciones no leídas. Usado por el badge del header.
        Respuesta cacheada durante 30 segundos en el servidor.
      security:
        - bearerJwtFull: []
      responses:
        '200':
          description: Conteo de no leídas
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    example: 3
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/notifications/{id}/revoke-session:
    post:
      tags: [Notifications]
      summary: Revocar sesión desde notificación (US-304)
      description: |
        Revoca la sesión asociada a una notificación de seguridad directamente desde
        el centro de notificaciones. El `contextId` de la notificación debe referenciar
        una sesión activa. El eventType debe ser de tipo LOGIN_* o SESSION_*.
      security:
        - bearerJwtFull: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la notificación desde la que se dispara la acción
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Sesión revocada correctamente }
        '400':
          description: Notificación sin sesión asociada o tipo no revocable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/notifications/stream:
    get:
      tags: [Notifications]
      summary: Stream SSE de notificaciones en tiempo real (US-305)
      description: |
        Conecta al stream Server-Sent Events para recibir notificaciones en tiempo real.

        **Diseño ADR-012:**
        - 1 conexión activa por usuario (last-write-wins si se abre una segunda)
        - Heartbeat cada 30s para mantener la conexión a través de proxies
        - Reconexión automática por EventSource; `Last-Event-ID` para replay

        **Headers de respuesta (ADR-010):**
        - `X-Accel-Buffering: no` — desactiva buffering en Nginx
        - `Cache-Control: no-cache, no-store` — bypass de CDN
        - `Content-Type: text/event-stream`

        **Eventos emitidos:**
        | Evento | Descripción |
        |--------|-------------|
        | `notification` | Nueva notificación de seguridad (payload: `NotificationDto`) |
        | `unread-count-updated` | Badge actualizado (payload: `{ count: N }`) |
        | `heartbeat` | Keepalive cada 30s (payload vacío — ignorar en cliente) |

        **Fallback:** si SSE no está disponible, el cliente hace polling de `/unread-count` cada 60s (R-F4-003).
      security:
        - bearerJwtFull: []
      parameters:
        - name: Last-Event-ID
          in: header
          required: false
          description: ID del último evento recibido. Si se envía, el servidor emite el unread-count actualizado como primer evento.
          schema: { type: string }
      responses:
        '200':
          description: Stream SSE activo
          headers:
            X-Accel-Buffering:
              schema: { type: string, example: 'no' }
            Cache-Control:
              schema: { type: string, example: 'no-cache, no-store' }
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Formato Server-Sent Events:
                  ```
                  id: <uuid>
                  event: notification
                  data: {"id":"...","eventType":"LOGIN_NEW_DEVICE","title":"..."}

                  id: <uuid>
                  event: unread-count-updated
                  data: {"count":3}

                  event: heartbeat
                  data:
                  ```
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Pool SSE al límite (200 conexiones activas)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ─── Cuenta / Auth (referencia compacta) ─────────────────────────────────────

  /api/v1/account/unlock:
    post:
      tags: [Account]
      summary: Solicitar enlace de desbloqueo (US-602)
      description: Siempre retorna 204 para evitar user enumeration (R-SEC-004).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '204': { description: Enlace enviado si el email existe y la cuenta está bloqueada }
        '400': { description: Email con formato inválido }

  /api/v1/account/unlock/{token}:
    get:
      tags: [Account]
      summary: Desbloquear cuenta desde enlace email (US-602)
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '302':
          description: Redirect a /login?reason=account-unlocked
          headers:
            Location:
              schema: { type: string, example: '/login?reason=account-unlocked' }
        '400': { description: Token inválido, expirado o ya utilizado }

  /api/v1/auth/confirm-context:
    post:
      tags: [Auth]
      summary: Confirmar acceso desde subnet nueva (US-603)
      description: |
        Requiere JWT scope=context-pending (ADR-011).
        Tras confirmar: el JWT context-pending se blacklistea en Redis (DEBT-009)
        y la subnet se registra como conocida.
      security:
        - bearerJwtContextPending: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmToken, currentSubnet]
              properties:
                confirmToken: { type: string }
                currentSubnet: { type: string, example: '192.168.1' }
      responses:
        '204': { description: Contexto confirmado, subnet registrada }
        '400': { description: Token inválido, expirado o ya utilizado }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Scope incorrecto (no context-pending) }

  /api/v1/security/config-history:
    get:
      tags: [Audit]
      summary: Historial de cambios de configuración (US-604)
      security:
        - bearerJwtFull: []
      parameters:
        - name: since
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: eventType
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Historial de cambios (máx. 90 días)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfigHistoryResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  schemas:

    NotificationDto:
      type: object
      properties:
        id:              { type: string, format: uuid }
        eventType:       { type: string, example: 'LOGIN_NEW_DEVICE' }
        title:           { type: string, example: 'Nuevo acceso detectado' }
        body:            { type: string, example: 'Chrome · Windows · 192.168.1.xxx' }
        actionUrl:       { type: string, nullable: true, example: '/security/sessions?highlight=abc' }
        contextId:       { type: string, nullable: true, description: 'sessionId / deviceId para deep-links' }
        createdAt:       { type: string, format: date-time }
        read:            { type: boolean }
        ipMasked:        { type: string, example: '192.168.1.xxx', nullable: true }
        unusualLocation: { type: boolean, description: 'true si la subnet no era conocida en el momento del evento' }

    NotificationPage:
      type: object
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/NotificationDto' }
        totalElements: { type: integer }
        totalPages:    { type: integer }
        number:        { type: integer, description: 'Página actual (0-indexed)' }
        size:          { type: integer }

    ConfigHistoryResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            type: object
            properties:
              id:               { type: string, format: uuid }
              eventType:        { type: string }
              eventDescription: { type: string }
              occurredAt:       { type: string, format: date-time }
              ipSubnet:         { type: string }
              unusualLocation:  { type: boolean }
        total: { type: integer }

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:    { type: string, example: 'UNAUTHORIZED' }
        message: { type: string, example: 'Token inválido o expirado.' }

  responses:
    Unauthorized:
      description: JWT inválido, expirado o revocado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example: { code: "UNAUTHORIZED", message: "Token inválido o expirado." }

    InternalError:
      description: Error interno del servidor
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example: { code: "INTERNAL_ERROR", message: "Error inesperado. Contacte soporte." }

  securitySchemes:
    bearerJwtPartial:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT parcial (scope=2fa-pending, alg=RS256). TTL: 300s.
        Claims (ACT-30): sub, scope, jti, iat, exp.

    bearerJwtFull:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT de sesión completa (scope=full-session, alg=RS256). TTL: 3600s.
        Claims (ACT-30): sub, scope, jti, twoFaEnabled, iat, exp.
        Verificado contra Redis blacklist en cada request (DEBT-009).

    bearerJwtContextPending:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT de contexto pendiente (scope=context-pending, alg=RS256). TTL: 900s.
        Claims (ACT-30): sub, scope, jti, pendingSubnet, iat, exp.
        Válido únicamente para POST /api/v1/auth/confirm-context.
        Blacklisted en Redis tras primer uso exitoso (DEBT-009 Sprint 8).
