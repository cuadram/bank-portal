# docker-compose.yml — BankPortal v1.9.0
# STG · Sprint 9 · FEAT-007 · DEBT-011/012
# Variables sensibles inyectadas desde .env — NUNCA commitear .env con valores reales

services:

  # ── BACKEND ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../../apps/backend-2fa
      dockerfile: Dockerfile
    image: bankportal-backend-2fa:${IMAGE_TAG:-latest-dev}
    container_name: bankportal-backend
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE:      ${SPRING_PROFILE:-staging}
      SERVER_PORT:                 8080
      # Base de datos
      SPRING_DATASOURCE_URL:       ${DB_URL}
      SPRING_DATASOURCE_USERNAME:  ${DB_USER:-bankportal}
      SPRING_DATASOURCE_PASSWORD:  ${DB_PASSWORD}
      # Redis — DEBT-011: SSE Pub/Sub multi-pod
      SPRING_REDIS_URL:            ${REDIS_URL}
      # JWT
      JWT_PRIVATE_KEY:             ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY:              ${JWT_PUBLIC_KEY}
      # FEAT-007: extractos + notificaciones
      STATEMENT_EXPORT_MAX_TRANSACTIONS: 500
      SSE_REDIS_CHANNEL_PREFIX:    sse:user
      # DEBT-012: purga nocturna
      NOTIFICATION_PURGE_CRON:     "0 0 2 * * *"
      # Actuator / observabilidad
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ── FRONTEND ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../apps/frontend-portal
      dockerfile: Dockerfile
    image: bankportal-frontend-portal:${IMAGE_TAG:-latest-dev}
    container_name: bankportal-frontend
    restart: unless-stopped
    ports:
      - "4201:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # ── POSTGRESQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bankportal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-bankportal}
      POSTGRES_USER:     ${DB_USER:-bankportal}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bankportal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REDIS — DEBT-011: SSE multi-pod Pub/Sub ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bankportal-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --loglevel warning --save 60 1
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: bankportal-net
    driver: bridge
