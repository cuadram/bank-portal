# K8s Deployment — bankportal-backend-2fa v1.6.0
# FEAT-001→006 | Sprint 7 | DEBT-008 + US-403 + US-601 + US-604
# DevOps Agent — 2026-06-09

apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankportal-2fa
  namespace: bankportal-prod
  labels:
    app: bankportal-2fa
    version: "v1.6.0"
    sprint: "sprint-7"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: bankportal-2fa
  template:
    metadata:
      labels:
        app: bankportal-2fa
        version: "v1.6.0"
    spec:
      containers:
        - name: bankportal-2fa
          image: registry.meridian.internal/bankportal-backend-2fa:v1.6.0
          ports:
            - containerPort: 8080
          env:
            # ── BD ────────────────────────────────────────────────────────
            - name: DB_URL
              valueFrom:
                secretKeyRef: { name: bankportal-db-secrets, key: DB_URL }
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef: { name: bankportal-db-secrets, key: DB_USERNAME }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: bankportal-db-secrets, key: DB_PASSWORD }
            # ── Redis ─────────────────────────────────────────────────────
            - name: REDIS_URL
              valueFrom:
                secretKeyRef: { name: bankportal-infra-secrets, key: REDIS_URL }
            # ── JWT RS256 ─────────────────────────────────────────────────
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef: { name: bankportal-jwt-keypair, key: private.pem }
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef: { name: bankportal-jwt-keypair, key: public.pem }
            - name: JWT_SESSION_TTL_SECONDS
              value: "3600"
            # ── JWT context-pending (FEAT-006 US-603 — ADR-011) ──────────
            - name: JWT_CONTEXT_PENDING_TTL_SECONDS
              value: "900"
            # ── TOTP ──────────────────────────────────────────────────────
            - name: TOTP_AES_KEY
              valueFrom:
                secretKeyRef: { name: bankportal-2fa-secrets, key: TOTP_AES_KEY }
            - name: TOTP_ISSUER
              value: "BankMeridian"
            # ── Account Lock (FEAT-006 US-601) ────────────────────────────
            - name: ACCOUNT_LOCK_MAX_ATTEMPTS
              value: "10"
            - name: ACCOUNT_LOCK_WARNING_THRESHOLD
              value: "7"
            - name: ACCOUNT_LOCK_WINDOW_HOURS
              value: "24"
            - name: ACCOUNT_UNLOCK_LINK_TTL_SECONDS
              value: "3600"
            - name: ACCOUNT_UNLOCK_HMAC_KEY
              valueFrom:
                secretKeyRef: { name: bankportal-account-secrets, key: ACCOUNT_UNLOCK_HMAC_KEY }
            # ── Dashboard executor (DEBT-008) ─────────────────────────────
            - name: SOFIA_DASHBOARD_TIMEOUT_SECONDS
              value: "5"
            # ── Session Management ────────────────────────────────────────
            - name: SESSION_MAX_CONCURRENT
              value: "3"
            - name: SESSION_DEFAULT_TIMEOUT_MIN
              value: "30"
            - name: SESSION_DENY_LINK_HMAC_KEY
              valueFrom:
                secretKeyRef: { name: bankportal-session-secrets, key: SESSION_DENY_LINK_HMAC_KEY }
            # ── Trusted Devices ───────────────────────────────────────────
            - name: TRUSTED_DEVICE_HMAC_KEY
              valueFrom:
                secretKeyRef: { name: bankportal-trusted-device-secrets, key: TRUSTED_DEVICE_HMAC_KEY }
            - name: TRUSTED_DEVICE_HMAC_KEY_PREVIOUS
              valueFrom:
                secretKeyRef: { name: bankportal-trusted-device-secrets, key: TRUSTED_DEVICE_HMAC_KEY_PREVIOUS }
            - name: TRUSTED_DEVICE_TTL_DAYS
              value: "30"
            - name: TRUSTED_DEVICE_MAX_PER_USER
              value: "10"
            - name: TRUSTED_DEVICE_COOKIE_SECURE
              value: "true"
            # ── Email ─────────────────────────────────────────────────────
            - name: EMAIL_API_KEY
              valueFrom:
                secretKeyRef: { name: bankportal-email-secrets, key: EMAIL_API_KEY }
            - name: EMAIL_FROM
              value: "seguridad@bankmeridian.com"
            - name: DENY_BASE_URL
              value: "https://api.bankportal.meridian.com/v1/sessions/deny"
            - name: UNLOCK_BASE_URL
              value: "https://api.bankportal.meridian.com/v1/account/unlock"
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits:   { memory: "1Gi",   cpu: "1000m" }
