# ─────────────────────────────────────────────────────────────────────────────
# BankPortal — KYC Secrets template para Kubernetes — FEAT-013 ADR-023
# SOFIA DevOps Agent — Sprint 15
# ⚠️  ESTE ARCHIVO NO DEBE COMMITEARSE CON VALORES REALES
#
# Crear el secret en cada namespace:
#
#   kubectl create secret generic bankportal-kyc-secrets \
#     --from-literal=KYC_ENCRYPTION_KEY='<64-hex-chars-32-bytes>' \
#     -n bankportal-stg
#
# Generar clave AES-256 (32 bytes en hex):
#   python3 -c "import secrets; print(secrets.token_hex(32))"
#   # → 64 caracteres hexadecimales
#
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: bankportal-kyc-secrets
  namespace: bankportal-prod
  labels:
    app: bankportal-2fa
    component: kyc
    managed-by: sofia-devops
type: Opaque
stringData:
  KYC_ENCRYPTION_KEY: ""   # 64 hex chars (32 bytes AES-256) — OBLIGATORIO antes de deploy

# ─── Checklist pre-deploy ────────────────────────────────────────────────────
# □ KYC_ENCRYPTION_KEY generada y rotada desde la anterior (si aplica)
# □ Secret creado en bankportal-stg Y bankportal-prod ANTES del despliegue
# □ Volumen /data/kyc-docs montado en el nodo (PersistentVolumeClaim)
# □ Backup del volumen configurado (retención mínima 5 años — RGPD Art.5)
# □ ROLE_KYC_REVIEWER asignado al menos a 1 usuario operador en STG
