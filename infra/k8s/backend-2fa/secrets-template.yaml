# ─────────────────────────────────────────────────────────────────────────────
# BankPortal — backend-2fa — Secrets template para Kubernetes
# SOFIA DevOps Agent — FEAT-001
# ⚠️ ESTE ARCHIVO NO DEBE COMMITEARSE CON VALORES REALES
# Usar como referencia para crear los Kubernetes Secrets en cada namespace
# ─────────────────────────────────────────────────────────────────────────────
#
# Crear el secret en cada namespace con los valores reales:
#
#   kubectl create secret generic backend-2fa-secrets \
#     --from-literal=SPRING_DATASOURCE_URL='jdbc:postgresql://host:5432/bankportal' \
#     --from-literal=SPRING_DATASOURCE_USERNAME='bankportal_user' \
#     --from-literal=SPRING_DATASOURCE_PASSWORD='<password>' \
#     --from-literal=TOTP_ENCRYPTION_KEY='<32-bytes-base64>' \
#     --from-literal=JWT_PARTIAL_SECRET='<min-32-chars>' \
#     --from-literal=JWT_FULL_SECRET='<min-32-chars>' \
#     --from-literal=TEAMS_WEBHOOK='<url>' \
#     -n bankportal
#
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: backend-2fa-secrets
  namespace: bankportal
  labels:
    app: backend-2fa
    managed-by: sofia-devops
type: Opaque
# IMPORTANTE: stringData está vacío — los valores se configuran manualmente
# o via herramienta de secrets management (Vault, AWS Secrets Manager, Azure Key Vault)
stringData:
  SPRING_DATASOURCE_URL: ""           # jdbc:postgresql://<host>:5432/bankportal
  SPRING_DATASOURCE_USERNAME: ""      # usuario de BD (no root)
  SPRING_DATASOURCE_PASSWORD: ""      # password de BD
  TOTP_ENCRYPTION_KEY: ""             # clave AES-256 en base64 (32 bytes = 44 chars base64)
  JWT_PARTIAL_SECRET: ""              # clave JWT sesión parcial (mínimo 32 chars)
  JWT_FULL_SECRET: ""                 # clave JWT sesión completa (mínimo 32 chars)
  TEAMS_WEBHOOK: ""                   # webhook de notificaciones Teams

# ─── Checklist de secrets por ambiente ───────────────────────────────────────
# □ bankportal-dev   → configurados con valores de desarrollo
# □ bankportal-stg   → configurados con valores de staging (BD separada)
# □ bankportal       → configurados con valores de producción (BD PROD)
# □ Rotación de claves JWT documentada en runbook
# □ TOTP_ENCRYPTION_KEY generada con: openssl rand -base64 32
